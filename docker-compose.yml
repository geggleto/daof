# Local Redis (backbone) and MongoDB (skills/capabilities registry). No auth — for local development only.
# Start: docker compose up -d
# Stop:  docker compose down
#
# For production: set backbone URL and REGISTRY_MONGO_URI in env or org manifest.

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
